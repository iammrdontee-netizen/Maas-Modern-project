<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Portal Maas Modern</title>
     <link rel="stylesheet" href="app.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;&display=swap" rel="stylesheet">
</head>
<body onload="loadTeacherDashboard()">
    <header>
        <div class="container">
            <div class="logo">
                <h2>Teacher Portal Maas Modern</h2>
                <a href="index.html"><img src="images/logo.jpg" alt="Maas Modern Groups of Schools Logo" class="logo-image" width="100" height="100"></a>
            </div>
            <button onclick="logout()" class="btn">Logout</button>
        </div>
    </header>
    <section class="portal-content">
        <div class="container">
            <h2>Welcome, <span id="teacherName"></span></h2>
            <h3>Add Student Results</h3>
            <form id="resultForm">
                <div class="form-group">
                    <label>Select Student </label>
                    <select id="filterSection" onchange="loadStudentsForTeacher()">
                        <option value="">All Sections</option>
                        <option value="primary">Primary School</option>
                        <option value="secondary">Secondary School</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Select Student</label>
                    <select id="studentSelect" required>
                        <option value="">Select a student</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Subject</label>
                    <input type="text" id="subject" placeholder="e.g. Digital Technology, Mathematic, English" required>
                </div>
                <div class="form-group">
                    <label>Test Score</label>
                    <input type="number" id="testScore" step="0.01" min="0" max="40">
                </div>
                <div class="form-group">
                    <label>Exam Score</label>
                    <input type="number" id="examScore" step="0.01" min="0" max="60">
                </div>
                <button type="submit" class="btn">Save Result</button>
            </form>
            <h3>Upload Class Note</h3>
            <form id="uploadForm">
                <div class="form-group">
                    <label>Topic/Title</label>
                    <input type="text" id="topic" required>
                </div>
                <div class="form-group">
                    <label>Class</label>
                    <input type="text" id="noteClass" placeholder="e.g. pry 3 or SS2" required>
                </div>
                <button type="submit" class="btn">Upload Note</button>
            </form>
        </div>
    </section>
     <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/app.js"></script>
   <script>
        document.addEventListener('DOMContentLoaded', checkAuthAndLoadName);
    </script>
</body>
</html>
