<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Maas Modern Group of Schools</title>
     <link rel="stylesheet" href="app.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo"><h2>Maas Modern Groups of School</h2>
            <a href="index.html"><img src="images/logo.jpg" alt="Maas Modern Groups of Schools Logo" class="logo-image" width="100" height="100"></a></div>
        </div>
    </header>
    <section class="login-section"> 
        <div class="container">
            <div class="login-box">
                <h2>Portal Login</h2>
                <form id="loginForm">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" required>
                    </div>
                    <button type="submit" class="btn" id="loginBtn">Login</button>
                </form>
                <p id="loginMessage" class="message"></p>
                <p> Don't have an account? <a href="register.html">Register Here</a></p>
            </div>
        </div>
    </section>
     <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/app.js"></script>
    
</body>
</html>
