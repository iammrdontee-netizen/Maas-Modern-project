<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Maas Modern Group of Schools</title>
     <link rel="stylesheet" href="app.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <h2>Maas Modern</h2>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="register.html">Register</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="login-section" style="padding: 100px 20px; background: #f8f9fa;">
        <div class="container">
            <div class="login-box">
                <h2 style="text-align: center; margin-bottom: 30px; color: white;">Portal Login</h2>
                
                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="Enter your email" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Enter your password" required>
                    </div>
                    
                    <button type="submit" class="btn" style="width: 100%; margin-top: 20px;">Login</button>
                </form>

                <p id="loginMessage" style="text-align: center; margin-top: 15px; font-weight: 500;"></p>
                
                <p style="text-align: center; margin-top: 25px; color: white;">
                    Don't have an account? 
                    <a href="register.html" style="color: #ffd700;">Register Here</a>
                </p>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/app.js"></script>
</body>
</html>
