<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Maas Modern</title>
     <link rel="stylesheet" href="app.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <h2>Admin Dashboard Maas Modern</h2>
                <a href="index.html"><img src="images/logo.jpg" alt="Maas Modern Groups of Schools Logo" class="logo-image" width="100" height="100"></a>
            </div>
            <button onclick="logout()" class="btn">Logout</button>
        </div>
    </header>
    <section class="portal-content">
        <div class="container">
            <h2>Admin Control Center</h2>
            <div class="admin-tabs">
                <button onclick="showAdminTab(0)" class="tab-btn">All Users</button>
                <button onclick="showAdminTab(1)" class="tab-btn">Student Results</button>
            </div>
            <div id="tab-users" class="admin-tab">
                <div class="filter-bar">
                    <input type="text" id="searchInput" placeholder="Search by name...." onkeyup="filterUsers()">
                    <select id="classFilter" onchange="filterUsers()">
                        <option value="">All Classes</option>
                    </select>
                </div>
                <div style="margin: 15px 0;">
                    <button onclick="bulkSuspend()" class="action-btn" style="background:#d32f2f; color: white;">Suspend Selected</button>
                    <button onclick="bulkActivate()" class="action-btn" style="background:#4caf50; color: white;">Activate Selected</button>
                    <button onclick="bulkDelete()" class="action-btn" style="background:#1976d2; color: white;">Delete Selected</button>
                    <span id="selectedCount" style="margin-left: 15px; font-weight: bold;">0 selected</span>
                </div>
                <h3>All Regitered Users</h3>
                <div id="users-list"></div>

            </div>
            <div id="tab-results" class="admin-tab" style="display: none;">
                <div class="filter-bar">
                    <input type="text" id="resultSearchInput" placeholder="Search by student or subject....." onkeyup="filterResults()">
                    <select id="resultClassFilter" onchange="filterResults()">
                        <option value="">All Classes</option>
                    </select>
                    <button onclick="exportResultsToCSV()" class="action-btn" style="background: #1976d2; color: white;">Export to CSV</button>
                </div>
                <div style="margin: 15px 0;">
                    <button onclick="bulkDeleteResult()" class="action-btn" style="background: #d32f2f; color:white;">Delete Selected Results</button>
                    <span id="selectedResultsCount" style="margin-left: 15px; font-weight: bold;">0 selected</span>
                </div>
               <h3>All Student Results</h3>
               <div id="all-results-list"></div> 
            </div>
        </div>
    </section>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/app.js"></script>
</body>
</html>
