<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal - Maas Modern</title>
    <link rel="stylesheet" href="app.css">
    <style>
        .admin-container { padding: 20px; }
        .welcome-header {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            text-align: center;
        }
        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 12px 20px;
            background: #f1f1f1;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        .tab-btn.active {
            background: #667eea;
            color: white;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin-bottom: 25px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th { background: #f8f9fa; }
        .btn-small {
            padding: 6px 12px;
            font-size: 14px;
            margin: 2px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
        }
        .modal-content {
            background: white;
            margin: 5% auto;
            padding: 25px;
            width: 90%;
            max-width: 500px;
            border-radius: 12px;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h2>Maas Modern</h2>
            <p>Welcome, <strong id="userName">Loading...</strong></p>
            <button onclick="logout()" class="btn">Logout</button>
        </div>
    </header>

    <div class="admin-container container">
        <div class="welcome-header">
            <h1>Admin Dashboard</h1>
        </div>

        <div class="tab-buttons">
            <button class="tab-btn active" onclick="showAdminTab('users')">Users Management</button>
            <button class="tab-btn" onclick="showAdminTab('results')">Results Management</button>
        </div>

        <!-- Users Tab -->
        <div id="usersTab" class="tab-content">
            <div class="card">
                <h3>All Registered Users</h3>
                <table id="usersTable">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Section</th>
                            <th>Class</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody"></tbody>
                </table>
            </div>
        </div>

        <!-- Results Tab -->
        <div id="resultsTab" class="tab-content" style="display:none;">
            <div class="card">
                <h3>All Student Results</h3>
                <table id="resultsTable">
                    <thead>
                        <tr>
                            <th>Student</th>
                            <th>Subject</th>
                            <th>Score</th>
                            <th>Grade</th>
                            <th>Term</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="resultsTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal for Edit/Reset -->
    <div id="actionModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle"></h3>
            <div id="modalBody"></div>
            <button onclick="closeModal()" style="margin-top:15px;">Close</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/app.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            checkAuthAndLoadName();
            showAdminTab('users');
        });
    </script>
</body>
</html>
