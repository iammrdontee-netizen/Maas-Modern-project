<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal - Maas Modern</title>
    <link rel="stylesheet" href="app.css">
    <style>
        .admin-container { padding: 20px; }
        .welcome-header {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            text-align: center;
        }
        .tab-buttons { display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
        .tab-btn { padding: 12px 24px; background: #f1f1f1; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .tab-btn.active { background: #667eea; color: white; }
        .card { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); margin-bottom: 25px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 10px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; }
        .btn-small { padding: 6px 12px; font-size: 13px; margin: 2px; }
        .btn-danger { background: #e74c3c; color: white; }
        
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center;
        }
        .modal-content {
            background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 500px;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h2>Maas Modern</h2>
            <p>Welcome, <strong id="userName">Loading...</strong></p>
            <button onclick="logout()" class="btn">Logout</button>
        </div>
    </header>

    <div class="admin-container container">
        <div class="welcome-header">
            <h1>Admin Dashboard</h1>
        </div>

        <div class="tab-buttons">
            <button class="tab-btn active" onclick="showAdminTab('users')">Users Management</button>
        </div>

        <div id="usersTab" class="tab-content">
            <div class="card">
                <h3>All Registered Users</h3>
                <table id="usersTable">
                    <thead>
                        <tr>
                            <th>Full Name</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Section</th>
                            <th>Level</th>
                            <th>Stream</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Edit User Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3>Edit User</h3>
            <form id="editUserForm">
                <input type="hidden" id="editUserId">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="editFullName" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="editEmail" required>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="editStatus">
                        <option value="active">Active</option>
                        <option value="suspended">Suspended</option>
                    </select>
                </div>
                <button type="submit" class="btn">Save Changes</button>
                <button type="button" onclick="closeModal()" style="margin-left:10px;">Cancel</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/app.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            checkAuthAndLoadName();
            showAdminTab('users');
        });
    </script>
</body>
</html>
