<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register-Maas Modern Group of Schools</title>
     <link rel="stylesheet" href="app.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <h2>Maas Modern Group of School</h2>
                <a href="index.html"><img src="images/logo.jpg" alt="Maas Modern Groups of Schools Logo" class="logo-image" width="100" height="100"></a></div>
        </div>
    </header>
    <section class="login-section">
        <div class="container">
            <div class="login-box">
                <h2>Register New Account</h2>
                <form id="registerForm">
                    <div class="form-group">
                        <label>Full Name *</label>
                        <input type="text" id="fullName" placeholder="e.g. Saka John" required>
                    </div>
                    <div class="form-group">
                        <label>Email Address (for login) *</label>
                        <input type="email" id="regEmail" required>
                    </div>
                    <div class="form-group">
                        <label>Password (min 6 characters)  *</label>
                        <input type="password" id="regPassword" required>
                    </div>
                    <div class="form-group">
                        <label>Register As</label>
                        <select id="role" required onchange="updateRoleOptions()">
                            <option value="">Select Category</option>
                            <option value="student">Student</option>
                            <option value="teacher">Teacher</option>
                        </select>
                    </div>
                    <div class="form-group" id="sectionGroup" style="display:none;">
                        <label>School Section</label>
                        <select id="schoolSection" required>
                            <option value="">Select Section</option>
                            <option value="primary">Primary</option>
                            <option value="secondary">Secondary</option>
                        </select>
                    </div>
                    <div class="form-group" id="classGroup" style="display:none;">
                        <label>Class Level</label>
                        <select id="classLevel" required>
                            
                        </select>
                    </div>
                    <button type="submit" class="btn">Register</button>
                </form>
                <p id="registerMessage" class="message"></p>
            </div>
        </div>
    </section>
     <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/app.js"></script>
</body>
</html>
