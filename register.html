<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register-Maas Modern Group of Schools</title>
     <link rel="stylesheet" href="app.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <h2>Maas Modern</h2>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="login.html">Login</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="login-section" style="padding: 100px 20px; background: #f8f9fa;">
        <div class="container">
            <div class="login-box">
                <h2 style="text-align: center; margin-bottom: 30px; color: white;">Register</h2>
                
                <form id="registerForm">
                    <div class="form-group">
                        <label for="fullName">Full Name</label>
                        <input type="text" id="fullName" required>
                    </div>
                    <div class="form-group">
                        <label for="regEmail">Email</label>
                        <input type="email" id="regEmail" required>
                    </div>
                    <div class="form-group">
                        <label for="regPassword">Password</label>
                        <input type="password" id="regPassword" required minlength="6">
                    </div>
                    <div class="form-group">
                        <label for="role">Role</label>
                        <select id="role" required onchange="updateRoleOptions()">
                            <option value="">Select Role</option>
                            <option value="student">Student</option>
                            <option value="teacher">Teacher</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>

                    <div class="form-group" id="sectionGroup" style="display:none;">
                        <label for="schoolSection">Section</label>
                        <select id="schoolSection" onchange="populateClassOptions()">
                            <option value="">Select Section</option>
                            <option value="primary">Primary</option>
                            <option value="secondary">Secondary</option>
                        </select>
                    </div>

                    <div class="form-group" id="classGroup" style="display:none;">
                        <label for="classLevel">Class</label>
                        <select id="classLevel"></select>
                    </div>

                    <button type="submit" class="btn" style="width:100%; margin-top:20px;">Register</button>
                </form>

                <p id="registerMessage" style="text-align:center; margin-top:15px;"></p>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/app.js"></script>
</body>
</html>
