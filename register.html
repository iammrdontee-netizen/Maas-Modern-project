<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Maas Modern Group of Schools</title>
    <link rel="stylesheet" href="app.css">
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f9; }
        .container { max-width: 500px; margin: 40px auto; padding: 20px; }
        .login-box { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
        button:disabled { background: #95a5a6; cursor: not-allowed; }
        .sub-options { margin-left: 20px; }
        #registerMessage { text-align: center; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-box">
            <h2 style="text-align:center;">Register New User</h2>
            
            <form id="registerForm">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" required>
                </div>

                <div class="form-group">
                    <label for="regEmail">Email Address</label>
                    <input type="email" id="regEmail" required>
                </div>

                <div class="form-group">
                    <label for="regPassword">Password</label>
                    <input type="password" id="regPassword" required>
                </div>

                <div class="form-group">
                    <label for="role">Role</label>
                    <select id="role" required onchange="updateRoleOptions()">
                        <option value="">Select Role</option>
                        <option value="student">Student</option>
                        <option value="teacher">Teacher</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>

                <!-- School Section -->
                <div class="form-group" id="sectionGroup" style="display:none;">
                    <label for="schoolSection">School Section</label>
                    <select id="schoolSection" onchange="populateSubOptions()">
                        <option value="">Select Section</option>
                        <option value="pre-school">Pre-School</option>
                        <option value="primary">Primary</option>
                        <option value="junior-secondary">Junior Secondary (JSS)</option>
                        <option value="senior-secondary">Senior Secondary (SSS)</option>
                    </select>
                </div>

                <!-- Secondary Level -->
                <div class="form-group sub-options" id="secondarySubGroup" style="display:none;">
                    <label for="secondaryLevel">Secondary Level</label>
                    <select id="secondaryLevel" onchange="populateSeniorStreams()">
                        <option value="">Select Level</option>
                        <option value="junior">Junior Secondary (JSS)</option>
                        <option value="senior">Senior Secondary (SSS)</option>
                    </select>
                </div>

                <!-- Senior Stream -->
                <div class="form-group sub-options" id="seniorStreamGroup" style="display:none;">
                    <label for="seniorStream">Department / Stream</label>
                    <select id="seniorStream">
                        <option value="">Select Stream</option>
                        <option value="science">Science</option>
                        <option value="commercial">Commercial</option>
                        <option value="arts">Arts</option>
                    </select>
                </div>

                <button type="submit" disabled>Register</button>
                <p id="registerMessage"></p>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/app.js"></script>
</body>
</html>
