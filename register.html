<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Maas Modern Group of Schools</title>
    <link rel="stylesheet" href="app.css">
    <style>
        .form-group { margin-bottom: 18px; }
        .sub-options { margin-left: 20px; margin-top: 10px; display: none; }
        .welcome-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h2>Maas Modern</h2>
            <nav>
                <a href="index.html">Home</a> | 
                <a href="login.html">Login</a>
            </nav>
        </div>
    </header>

    <div class="container">
        <div class="welcome-header">
            <h1>New Member Registration</h1>
        </div>

        <div class="login-box">
            <form id="registerForm">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" required>
                </div>

                <div class="form-group">
                    <label for="regEmail">Email Address</label>
                    <input type="email" id="regEmail" required>
                </div>

                <div class="form-group">
                    <label for="regPassword">Password</label>
                    <input type="password" id="regPassword" required minlength="6">
                </div>

                <div class="form-group">
                    <label for="role">Role</label>
                    <select id="role" required onchange="updateRoleOptions()">
                        <option value="">Select Role</option>
                        <option value="student">Student</option>
                        <option value="teacher">Teacher</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>

                <!-- School Section -->
                <div class="form-group" id="sectionGroup" style="display:none;">
                    <label for="schoolSection">School Section</label>
                    <select id="schoolSection" onchange="populateSubOptions()">
                        <option value="">Select Section</option>
                        <option value="pre-school">Pre-School</option>
                        <option value="primary">Primary</option>
                        <option value="secondary">Secondary</option>
                    </select>
                </div>

                <!-- Sub Options for Secondary -->
                <div class="form-group sub-options" id="secondarySubGroup" style="display:none;">
                    <label for="secondaryLevel">Secondary Level</label>
                    <select id="secondaryLevel" onchange="populateSeniorStreams()">
                        <option value="">Select Level</option>
                        <option value="junior">Junior Secondary (JSS)</option>
                        <option value="senior">Senior Secondary (SSS)</option>
                    </select>
                </div>

                <!-- Senior Secondary Streams -->
                <div class="form-group sub-options" id="seniorStreamGroup" style="display:none;">
                    <label for="seniorStream">Senior Secondary Stream</label>
                    <select id="seniorStream">
                        <option value="">Select Stream</option>
                        <option value="science">Science</option>
                        <option value="commercial">Commercial</option>
                        <option value="arts">Arts</option>
                    </select>
                </div>

                <button type="submit" class="btn" style="width:100%; margin-top:20px;">Register Now</button>
            </form>

            <p id="registerMessage" style="text-align:center; margin-top:15px; font-weight:500;"></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/app.js"></script>
</body>
</html>
