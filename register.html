<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Maas Modern Group of Schools</title>
    <link rel="stylesheet" href="app.css">
    <style>
        .form-group { margin-bottom: 18px; }
        .section-options {
            display: none;
            margin-top: 10px;
        }
        .school-section-btn {
            padding: 12px 20px;
            margin: 5px;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            font-weight: 500;
        }
        .school-section-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h2>Maas Modern</h2>
            <nav>
                <a href="index.html">Home</a>
                <a href="login.html">Login</a>
            </nav>
        </div>
    </header>

    <section class="login-section">
        <div class="container">
            <div class="login-box">
                <h2 style="text-align:center; margin-bottom:30px;">Register New User</h2>
                
                <form id="registerForm">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="fullName" required>
                    </div>

                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="regEmail" required>
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="regPassword" required minlength="6">
                    </div>

                    <div class="form-group">
                        <label>Role</label>
                        <select id="role" required onchange="updateRoleOptions()">
                            <option value="">Select Role</option>
                            <option value="student">Student</option>
                            <option value="teacher">Teacher</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>

                    <!-- School Section Selection -->
                    <div class="form-group" id="sectionGroup" style="display:none;">
                        <label>School Section</label>
                        <div id="sectionButtons" class="section-options">
                            <button type="button" class="school-section-btn" onclick="selectSection('pre-school')">Pre-School</button>
                            <button type="button" class="school-section-btn" onclick="selectSection('primary')">Primary</button>
                            <button type="button" class="school-section-btn" onclick="selectSection('junior-secondary')">Junior Secondary (JSS)</button>
                            <button type="button" class="school-section-btn" onclick="selectSection('senior-secondary')">Senior Secondary (SSS)</button>
                        </div>
                        <input type="hidden" id="schoolSection">
                    </div>

                    <!-- Class Level (for students only) -->
                    <div class="form-group" id="classGroup" style="display:none;">
                        <label>Class Level</label>
                        <select id="classLevel"></select>
                    </div>

                    <button type="submit" class="btn" style="width:100%; margin-top:20px;">Register</button>
                </form>

                <p id="registerMessage" style="text-align:center; margin-top:15px; font-weight:500;"></p>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/app.js"></script>
</body>
</html>
