<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal</title>
     <link rel="stylesheet" href="app.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;&display=swap" rel="stylesheet">
</head>
<body onload="loadStudentDashboard()">
    <header>
        <div class="container">
            <div class="logo">
                <h2>Student Portal Maas Modern</h2>
                <a href="index.html"><img src="images/logo.jpg" alt="Maas Modern Groups of Schools Logo" class="logo-image" width="100" height="100"></a>
            </div>
            <button onclick="logout()" class="btn">Logout</button>
        </div>
    </header>
    <section class="portal-content">
        <div class="container">
            <h2>Welcome, <span id="studentName"></span></h2>
            <h3>My Academic Results</h3>
            <div id="student-results" class="notes-grid"></div>
             <h3>Available Class Notes</h3>
            <div id="notes-list" class="notes-grid"></div>
        </div>
    </section>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/app.js"></script>
</body>
</html>
