<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal - Maas Modern</title>
    <link rel="stylesheet" href="app.css">
    <style>
        .student-container { padding: 20px; }
        .welcome-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 30px;
            text-align: center;
        }
        .tab-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 14px 24px;
            background: #f1f1f1;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }
        .tab-btn.active {
            background: #667eea;
            color: white;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 6px 25px rgba(0,0,0,0.1);
            margin-bottom: 25px;
        }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 14px 10px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; }
        .download-btn {
            background: #27ae60;
            color: white;
            padding: 6px 14px;
            border-radius: 6px;
            text-decoration: none;
        }
        .note-card {
            background: #f9f9f9;
            padding: 18px;
            border-radius: 12px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h2>Maas Modern</h2>
            <p>Welcome, <strong id="userName">Loading...</strong></p>
            <button onclick="logout()" class="btn">Logout</button>
        </div>
    </header>

    <div class="student-container container">
        <div class="welcome-header">
            <h1>Student Dashboard</h1>
        </div>

        <div class="tab-buttons">
            <button class="tab-btn active" onclick="showStudentTab('results')">📊 My Results</button>
            <button class="tab-btn" onclick="showStudentTab('notes')">📝 Notes & Materials</button>
        </div>

        <!-- Results Tab -->
        <div id="resultsTab" class="tab-content">
            <div class="card">
                <h3>My Academic Results</h3>
                <table id="resultsTable">
                    <thead>
                        <tr>
                            <th>Subject</th>
                            <th>Score</th>
                            <th>Grade</th>
                            <th>Term</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody id="resultsTableBody"></tbody>
                </table>
            </div>
        </div>

        <!-- Notes Tab -->
        <div id="notesTab" class="tab-content" style="display:none;">
            <div class="card">
                <h3>Notes & Study Materials</h3>
                <div id="notesContainer"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/app.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            checkAuthAndLoadName();
            showStudentTab('results');
        });
    </script>
</body>
</html>
